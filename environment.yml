name: openbadgeslib
channels:
  - conda-forge
  - defaults
dependencies:
  # Runtime
  - python>=3.10
  - pycryptodome>=3.20
  - ecdsa>=0.19
  - pypng>=0.20220715.0
  - pyjwt>=2.8          # PyJWT[crypto] — 'crypto' extra not supported in conda
  - cryptography        # required by pyjwt[crypto]

  # Development / testing
  - pytest>=8.0
  - pytest-cov>=5.0

  # Documentation (optional)
  - sphinx>=7
  - sphinx_rtd_theme

  # Install the library itself in editable mode
  - pip
  - pip:
    - -e .
